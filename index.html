<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Grubu Sunucusu</title>
    <style>
        body {
            background-color: #1e1e2e;
            color: #cdd6f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #313244;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        h1 { color: #f5c2e7; margin-bottom: 10px; }
        p { color: #a6adc8; font-size: 16px; }
        .ip-box {
            background-color: #11111b;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 18px;
            color: #a6e3a1;
            margin: 20px 0;
            border: 1px solid #45475a;
        }
        .btn {
            background-color: #89b4fa;
            color: #11111b;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.2s;
        }
        .btn:hover { background-color: #b4befe; }
    </style>
</head>
<body>

<div class="container">
    <h1>MC Grubu</h1>
    <p>Element X Sohbet Sunucusu</p>
    
    <div class="ip-box">
        #mcgrupu:matrix.org
    </div>

    <a href="https://element.io/get-started/#/#mcgrupu:matrix.org" target="_blank" class="btn">Element X ile Gruba Katıl</a>
</div>

</body>
</html>
